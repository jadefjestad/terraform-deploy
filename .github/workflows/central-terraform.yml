###############################################################################
# Central Terraform Deployment Pipeline — Reusable Workflow
#
# Minimal version — Plan → Apply with OIDC auth and artifact hand-off.
# Add back Checkov, Infracost, TFLint, PR comments etc. once this works.
###############################################################################

name: Central Terraform Pipeline

on:
  workflow_call:
    inputs:
      env_name:
        description: "Target environment name (must match a GitHub Environment)"
        required: true
        type: string
      tf_working_dir:
        description: "Relative path to the Terraform root module"
        required: false
        type: string
        default: "infra"
      terraform_version:
        description: "Terraform CLI version (blank = latest)"
        required: false
        type: string
        default: ""
      destroy:
        description: "Set true to destroy the environment"
        required: false
        type: boolean
        default: false
      plan_only:
        description: "Set true to skip Apply (PR checks)"
        required: false
        type: boolean
        default: false
      team_name:
        description: "Team identifier for backend state container"
        required: false
        type: string
        default: "default"

concurrency:
  group: terraform-${{ inputs.env_name }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # ─── Plan ──────────────────────────────────────────────────────────────────
  plan:
    name: "Plan (${{ inputs.env_name }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name }}
    env:
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD_AUTH: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PLAN }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    defaults:
      run:
        working-directory: ${{ inputs.tf_working_dir }}
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version || 'latest' }}
          terraform_wrapper: false

      - name: Azure Login (OIDC — Plan)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PLAN }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ inputs.team_name }}" \
            -backend-config="key=${{ inputs.env_name }}.tfstate" \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        if: ${{ !inputs.destroy }}
        id: plan
        run: |
          set +e
          terraform plan \
            -input=false \
            -detailed-exitcode \
            -out=tfplan
          EXITCODE=$?
          echo "exitcode=$EXITCODE" >> "$GITHUB_OUTPUT"
          if [[ $EXITCODE -eq 1 ]]; then exit 1; fi

      - name: Upload Plan Artifact
        if: ${{ !inputs.destroy && steps.plan.outputs.exitcode == '2' }}
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.env_name }}
          path: ${{ inputs.tf_working_dir }}/tfplan
          retention-days: 5

  # ─── Apply ─────────────────────────────────────────────────────────────────
  apply:
    name: "Apply (${{ inputs.env_name }})"
    needs: plan
    if: >-
      !inputs.plan_only &&
      (inputs.destroy || needs.plan.outputs.plan_exitcode == '2')
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name }}
    env:
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD_AUTH: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    defaults:
      run:
        working-directory: ${{ inputs.tf_working_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version || 'latest' }}
          terraform_wrapper: false

      - name: Azure Login (OIDC — Apply)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ inputs.team_name }}" \
            -backend-config="key=${{ inputs.env_name }}.tfstate" \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -input=false

      - name: Terraform Destroy
        if: ${{ inputs.destroy }}
        run: terraform destroy -auto-approve -input=false

      - name: Download Plan Artifact
        if: ${{ !inputs.destroy }}
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.env_name }}
          path: ${{ inputs.tf_working_dir }}

      - name: Terraform Apply
        if: ${{ !inputs.destroy }}
        run: terraform apply -auto-approve -input=false tfplan
